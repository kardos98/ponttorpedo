<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ponttorpedó</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8;
            color: #333;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
        h1 {
            color: #2c3e50;
            text-align: center;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
        }
        .container {
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .rules {
            background-color: #e8f4f8;
            padding: 15px;
            border-left: 4px solid #3498db;
            margin-bottom: 20px;
            border-radius: 0 5px 5px 0;
            font-size: 0.9em;
        }
        .input-group {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
            align-items: center;
        }
        .input-group label {
            font-weight: bold;
            font-size: 1.2em;
        }
        input[type="number"] {
            width: 60px;
            padding: 10px;
            font-size: 1.1em;
            text-align: center;
            border: 1px solid #bdc3c7;
            border-radius: 5px;
        }
        .buttons {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        button {
            padding: 10px 20px;
            font-size: 1.1em;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
            font-weight: bold;
        }
        #btn-guess {
            background-color: #2ecc71;
            color: white;
        }
        #btn-guess:hover { background-color: #27ae60; }
        #btn-guess:disabled { background-color: #95a5a6; cursor: not-allowed; }
        
        #btn-new {
            background-color: #3498db;
            color: white;
        }
        #btn-new:hover { background-color: #2980b9; }

        #message {
            text-align: center;
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 20px;
            min-height: 30px;
        }
        .success { color: #27ae60; }
        .error { color: #e74c3c; }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid #ecf0f1;
        }
        th {
            background-color: #f8f9fa;
            color: #2c3e50;
        }
        tr:hover { background-color: #f5f6fa; }
        .distance-col { font-family: monospace; font-size: 1.1em; }
    </style>
</head>
<body>

    <h1>Ponttorpedó</h1>
    
    <div class="container">
        <div class="rules">
            <strong>Szabályok:</strong> A gép gondolt egy (x; y) pontra, ahol x és y is egész számok -5 és 5 között (határokat is beleértve). Találd ki minél kevesebb lépésből! A gép minden tipp után megadja a célponttól való távolságot.
        </div>

        <div class="input-group">
            <label for="guessX">x:</label>
            <input type="number" id="guessX" min="-5" max="5" value="0">
            <label for="guessY">y:</label>
            <input type="number" id="guessY" min="-5" max="5" value="0">
        </div>

        <div class="buttons">
            <button id="btn-guess" onclick="makeGuess()">Tippelés</button>
            <button id="btn-new" onclick="initGame()">Új játék</button>
        </div>

        <div id="message"></div>

        <table id="historyTable" style="display: none;">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Tipp (x; y)</th>
                    <th>Távolság</th>
                </tr>
            </thead>
            <tbody id="historyBody">
                </tbody>
        </table>
    </div>

    <script>
        let targetX, targetY;
        let guessCount = 0;
        let gameOver = false;

        function initGame() {
            // Generálunk egy számot -5 és 5 között
            targetX = Math.floor(Math.random() * 11) - 5;
            targetY = Math.floor(Math.random() * 11) - 5;
            
            guessCount = 0;
            gameOver = false;
            
            document.getElementById('guessX').value = 0;
            document.getElementById('guessY').value = 0;
            document.getElementById('btn-guess').disabled = false;
            
            const msg = document.getElementById('message');
            msg.textContent = "Új pont generálva! Kezdődhet a tippelés.";
            msg.className = "";

            document.getElementById('historyBody').innerHTML = "";
            document.getElementById('historyTable').style.display = "none";
        }

        function makeGuess() {
            if (gameOver) return;

            const xInput = document.getElementById('guessX').value;
            const yInput = document.getElementById('guessY').value;

            // Ellenőrzés, hogy beírtak-e valamit
            if (xInput === "" || yInput === "") {
                showMessage("Kérlek adj meg mindkét koordinátát!", "error");
                return;
            }

            const guessX = parseInt(xInput);
            const guessY = parseInt(yInput);

            if (guessX < -5 || guessX > 5 || guessY < -5 || guessY > 5) {
                showMessage("A koordinátáknak -5 és 5 között kell lenniük!", "error");
                return;
            }

            guessCount++;

            // Távolság kiszámítása (d^2 = dx^2 + dy^2)
            const dx = guessX - targetX;
            const dy = guessY - targetY;
            const dSquared = dx * dx + dy * dy;
            const distance = Math.sqrt(dSquared);

            let distanceText = "";
            if (dSquared === 0) {
                distanceText = "0";
            } else if (Number.isInteger(distance)) {
                distanceText = distance.toString();
            } else {
                distanceText = `√${dSquared} (≈ ${distance.toFixed(2)})`;
            }

            addHistoryRow(guessCount, guessX, guessY, distanceText);

            if (dSquared === 0) {
                showMessage(`Gratulálok! Eltaláltad ${guessCount} lépésből!`, "success");
                document.getElementById('btn-guess').disabled = true;
                gameOver = true;
            } else {
                showMessage("Nem talált, próbáld újra!", "");
            }
        }

        function showMessage(text, className) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = className;
        }

        function addHistoryRow(count, x, y, dist) {
            const table = document.getElementById('historyTable');
            const tbody = document.getElementById('historyBody');
            table.style.display = "table";

            const row = document.createElement('tr');
            
            const tdCount = document.createElement('td');
            tdCount.textContent = count + ".";
            
            const tdPoint = document.createElement('td');
            tdPoint.textContent = `(${x}; ${y})`;
            
            const tdDist = document.createElement('td');
            tdDist.textContent = dist;
            tdDist.className = "distance-col";

            row.appendChild(tdCount);
            row.appendChild(tdPoint);
            row.appendChild(tdDist);
            
            // A legújabb tipp kerüljön felülre
            tbody.insertBefore(row, tbody.firstChild);
        }

        // Játék indítása az oldal betöltésekor
        window.onload = initGame;
    </script>
</body>
</html>
